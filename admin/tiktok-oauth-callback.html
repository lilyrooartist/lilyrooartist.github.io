<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok OAuth Callback - Lily Roo</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f4ee;
      color: #181713;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      display: grid;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      line-height: 1.55;
      color: #4b473f;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
    }

    textarea,
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #c9c0ae;
      border-radius: 8px;
      padding: 12px;
      font: 14px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #fffdfa;
      color: #181713;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      background: #181713;
      color: #fffdfa;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #e5ddd0;
      color: #181713;
    }

    .status {
      min-height: 24px;
      font-weight: 700;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #181713;
        color: #fffdfa;
      }

      p {
        color: #d5cfc2;
      }

      textarea,
      input {
        background: #24221d;
        border-color: #5d574d;
        color: #fffdfa;
      }

      button {
        background: #fffdfa;
        color: #181713;
      }

      button.secondary {
        background: #3a352d;
        color: #fffdfa;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>TikTok OAuth Callback</h1>
    <p id="summary">Reading the TikTok redirect response...</p>

    <label>
      Authorization code
      <input id="code" readonly value="">
    </label>

    <label>
      Exchange command
      <textarea id="command" readonly></textarea>
    </label>

    <div class="actions">
      <button type="button" id="copy-code">Copy code</button>
      <button type="button" id="copy-command" class="secondary">Copy command</button>
    </div>

    <p class="status" id="status"></p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code") || "";
    const error = params.get("error") || "";
    const state = params.get("state") || "";
    const codeInput = document.getElementById("code");
    const commandBox = document.getElementById("command");
    const summary = document.getElementById("summary");
    const status = document.getElementById("status");

    function shellQuote(value) {
      return "'" + String(value).replaceAll("'", "'\"'\"'") + "'";
    }

    function setStatus(message) {
      status.textContent = message;
      window.setTimeout(() => {
        if (status.textContent === message) status.textContent = "";
      }, 3500);
    }

    async function copyText(value, label) {
      if (!value) {
        setStatus(`No ${label} available.`);
        return;
      }
      await navigator.clipboard.writeText(value);
      setStatus(`Copied ${label}.`);
    }

    if (error) {
      summary.textContent = `TikTok returned an error: ${error}`;
    } else if (code) {
      summary.textContent = state
        ? `TikTok returned an authorization code with state ${state}. Exchange it immediately.`
        : "TikTok returned an authorization code. Exchange it immediately.";
      codeInput.value = code;
      commandBox.value = `python3 scripts/tiktok_oauth_handoff.py --exchange-code ${shellQuote(code)} --apply --posting-mode upload`;
    } else {
      summary.textContent = "No code was found in the URL. Re-run the auth URL generator and authorize Lily Roo again.";
    }

    document.getElementById("copy-code").addEventListener("click", () => copyText(codeInput.value, "code"));
    document.getElementById("copy-command").addEventListener("click", () => copyText(commandBox.value, "command"));
  </script>
</body>
</html>
